services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oms-backend
    ports:
      - "5000:5000"
    volumes:
      - backend-data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_PATH=/app/data/orders.db
    networks:
      - oms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oms-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - oms-network

volumes:
  backend-data:

networks:
  oms-network:
    driver: bridge
